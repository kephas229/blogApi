services:
  - type: web
    name: blog-api
    runtime: docker
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: BlogFlow
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: blog-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blog-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: blog-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: blog-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blog-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_DOMAIN
        value: null
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: FILESYSTEM_DISK
        value: local

databases:
  - name: blog-db
    region: frankfurt
    plan: free
    databaseName: blog_db
    user: blog_user
    ipAllowList: []
